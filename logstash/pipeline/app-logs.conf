input {
  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "plain"
  }
}

filter {
  # Drop blank lines
  if [message] =~ /^\s*$/ {
    drop {}
  }

  # Parse Python log format: "2026-05-25 10:00:00,123 INFO message"
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:level}\s+%{GREEDYDATA:log_message}"
    }
    tag_on_failure => ["_grokparsefailure"]
  }

  mutate {
    add_field => { "service" => "face-analyzer-app" }
  }
}

output {
  opensearch {
    hosts => ["http://opensearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }
}
